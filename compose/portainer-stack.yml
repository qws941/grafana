version: "3.8"

# Portainer Stack Configuration for Grafana Monitoring + n8n
# Git Repository: https://github.com/qws941/grafana.git
# Path: compose/portainer-stack.yml

services:
  grafana:
    image: grafana/grafana:${GRAFANA_VERSION:-latest}
    container_name: grafana-container
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD:-bingogo1}
      - GF_SERVER_DOMAIN=${GRAFANA_DOMAIN:-grafana.jclee.me}
      - GF_SERVER_ROOT_URL=https://${GRAFANA_DOMAIN:-grafana.jclee.me}
      - GF_INSTALL_PLUGINS=${GRAFANA_PLUGINS:-grafana-clock-panel,grafana-simple-json-datasource,grafana-piechart-panel}
      - GF_FEATURE_TOGGLES_ENABLE=publicDashboards
    volumes:
      - grafana-vol:/var/lib/grafana
    restart: unless-stopped
    networks:
      - traefik-public
      - monitoring-net
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=traefik-public"
      - "traefik.http.routers.grafana.rule=Host(`${GRAFANA_DOMAIN:-grafana.jclee.me}`)"
      - "traefik.http.routers.grafana.entrypoints=websecure"
      - "traefik.http.routers.grafana.tls.certresolver=cloudflare"
      - "traefik.http.services.grafana.loadbalancer.server.port=3000"
      - "portainer.stack=grafana-monitoring"
      - "portainer.service=grafana"

  loki:
    image: grafana/loki:${LOKI_VERSION:-latest}
    container_name: loki-container
    volumes:
      - loki-vol:/loki
      - ./loki-config.yaml:/etc/loki/local-config.yaml:ro
    restart: unless-stopped
    networks:
      - traefik-public
      - monitoring-net
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=traefik-public"
      - "traefik.http.routers.loki.rule=Host(`${LOKI_DOMAIN:-loki.jclee.me}`)"
      - "traefik.http.routers.loki.entrypoints=websecure"
      - "traefik.http.routers.loki.tls.certresolver=cloudflare"
      - "traefik.http.services.loki.loadbalancer.server.port=3100"
      - "portainer.stack=grafana-monitoring"
      - "portainer.service=loki"

  prometheus:
    image: prom/prometheus:${PROMETHEUS_VERSION:-latest}
    container_name: prometheus-container
    volumes:
      - prometheus-vol:/prometheus
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=${PROMETHEUS_RETENTION:-30d}'
      - '--web.enable-lifecycle'
      - '--web.enable-admin-api'
    restart: unless-stopped
    networks:
      - traefik-public
      - monitoring-net
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=traefik-public"
      - "traefik.http.routers.prometheus.rule=Host(`${PROMETHEUS_DOMAIN:-prometheus.jclee.me}`)"
      - "traefik.http.routers.prometheus.entrypoints=websecure"
      - "traefik.http.routers.prometheus.tls.certresolver=cloudflare"
      - "traefik.http.services.prometheus.loadbalancer.server.port=9090"
      - "portainer.stack=grafana-monitoring"
      - "portainer.service=prometheus"

  promtail:
    image: grafana/promtail:${PROMTAIL_VERSION:-latest}
    container_name: promtail-container
    volumes:
      - ${HOST_LOG_PATH:-/var/log}:/var/log:ro
      - ${DOCKER_SOCK_PATH:-/var/run/docker.sock}:/var/run/docker.sock:ro
      - ./promtail-config.yml:/etc/promtail/config.yml:ro
    command: -config.file=/etc/promtail/config.yml
    restart: unless-stopped
    networks:
      - monitoring-net
    labels:
      - "portainer.stack=grafana-monitoring"
      - "portainer.service=promtail"

  node-exporter:
    image: prom/node-exporter:latest
    container_name: node-exporter-container
    volumes:
      - ${HOST_PROC_PATH:-/proc}:/host/proc:ro
      - ${HOST_SYS_PATH:-/sys}:/host/sys:ro
      - ${HOST_ROOT_PATH:-/}:/rootfs:ro
    command:
      - '--path.procfs=/host/proc'
      - '--path.rootfs=/rootfs'
      - '--path.sysfs=/host/sys'
      - '--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($|/)'
    restart: unless-stopped
    networks:
      - monitoring-net
    labels:
      - "portainer.stack=grafana-monitoring"
      - "portainer.service=node-exporter"

  cadvisor:
    image: gcr.io/cadvisor/cadvisor:latest
    container_name: cadvisor-container
    volumes:
      - ${HOST_ROOT_PATH:-/}:/rootfs:ro
      - ${HOST_VAR_RUN_PATH:-/var/run}:/var/run:rw
      - /sys:/sys:ro
      - ${HOST_DOCKER_PATH:-/var/lib/docker}:/var/lib/docker:ro
    privileged: true
    restart: unless-stopped
    networks:
      - monitoring-net
    labels:
      - "portainer.stack=grafana-monitoring"
      - "portainer.service=cadvisor"

  alertmanager:
    image: prom/alertmanager:latest
    container_name: alertmanager-container
    volumes:
      - alertmanager-vol:/alertmanager
    command:
      - '--storage.path=/alertmanager'
    restart: unless-stopped
    networks:
      - monitoring-net
      - traefik-public
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=traefik-public"
      - "traefik.http.routers.alertmanager.rule=Host(`${ALERTMANAGER_DOMAIN:-alertmanager.jclee.me}`)"
      - "traefik.http.routers.alertmanager.entrypoints=websecure"
      - "traefik.http.routers.alertmanager.tls.certresolver=cloudflare"
      - "traefik.http.services.alertmanager.loadbalancer.server.port=9093"
      - "portainer.stack=grafana-monitoring"
      - "portainer.service=alertmanager"

  # ============================================
  # n8n Workflow Automation
  # ============================================
  n8n:
    image: n8nio/n8n:latest
    container_name: n8n-container
    restart: unless-stopped
    environment:
      - N8N_HOST=${N8N_DOMAIN:-n8n.jclee.me}
      - N8N_PORT=5678
      - N8N_PROTOCOL=https
      - N8N_METRICS=true
      - N8N_METRICS_PREFIX=n8n_
      - DB_TYPE=postgresdb
      - DB_POSTGRESDB_HOST=n8n-postgres
      - DB_POSTGRESDB_PORT=5432
      - DB_POSTGRESDB_DATABASE=${N8N_DB_NAME:-n8n}
      - DB_POSTGRESDB_USER=${N8N_DB_USER:-n8n}
      - DB_POSTGRESDB_PASSWORD=${N8N_DB_PASSWORD:-n8n_password}
      - EXECUTIONS_MODE=queue
      - QUEUE_BULL_REDIS_HOST=n8n-redis
      - QUEUE_BULL_REDIS_PORT=6379
      - N8N_LOG_LEVEL=info
      - N8N_LOG_OUTPUT=console
      - N8N_BASIC_AUTH_ACTIVE=true
      - N8N_BASIC_AUTH_USER=${N8N_USER:-admin}
      - N8N_BASIC_AUTH_PASSWORD=${N8N_PASSWORD:-bingogo1}
      - GENERIC_TIMEZONE=Asia/Seoul
      - TZ=Asia/Seoul
    volumes:
      - n8n-vol:/home/node/.n8n
      - ${DOCKER_SOCK_PATH:-/var/run/docker.sock}:/var/run/docker.sock:ro
    networks:
      - traefik-public
      - monitoring-net
    depends_on:
      - n8n-postgres
      - n8n-redis
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=traefik-public"
      - "traefik.http.routers.n8n.rule=Host(`${N8N_DOMAIN:-n8n.jclee.me}`)"
      - "traefik.http.routers.n8n.entrypoints=websecure"
      - "traefik.http.routers.n8n.tls.certresolver=cloudflare"
      - "traefik.http.services.n8n.loadbalancer.server.port=5678"
      - "portainer.stack=grafana-monitoring"
      - "portainer.service=n8n"

  n8n-postgres:
    image: postgres:15-alpine
    container_name: n8n-postgres-container
    restart: unless-stopped
    environment:
      - POSTGRES_DB=${N8N_DB_NAME:-n8n}
      - POSTGRES_USER=${N8N_DB_USER:-n8n}
      - POSTGRES_PASSWORD=${N8N_DB_PASSWORD:-n8n_password}
    volumes:
      - n8n-postgres-vol:/var/lib/postgresql/data
    networks:
      - monitoring-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U n8n"]
      interval: 10s
      timeout: 5s
      retries: 5
    labels:
      - "portainer.stack=grafana-monitoring"
      - "portainer.service=n8n-postgres"

  n8n-redis:
    image: redis:7-alpine
    container_name: n8n-redis-container
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - n8n-redis-vol:/data
    networks:
      - monitoring-net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    labels:
      - "portainer.stack=grafana-monitoring"
      - "portainer.service=n8n-redis"

  n8n-postgres-exporter:
    image: prometheuscommunity/postgres-exporter:latest
    container_name: n8n-postgres-exporter-container
    restart: unless-stopped
    environment:
      - DATA_SOURCE_NAME=postgresql://${N8N_DB_USER:-n8n}:${N8N_DB_PASSWORD:-n8n_password}@n8n-postgres:5432/${N8N_DB_NAME:-n8n}?sslmode=disable
    networks:
      - monitoring-net
    depends_on:
      - n8n-postgres
    labels:
      - "portainer.stack=grafana-monitoring"
      - "portainer.service=n8n-postgres-exporter"

  n8n-redis-exporter:
    image: oliver006/redis_exporter:latest
    container_name: n8n-redis-exporter-container
    restart: unless-stopped
    environment:
      - REDIS_ADDR=n8n-redis:6379
    networks:
      - monitoring-net
    depends_on:
      - n8n-redis
    labels:
      - "portainer.stack=grafana-monitoring"
      - "portainer.service=n8n-redis-exporter"

networks:
  traefik-public:
    external: true
  monitoring-net:
    driver: bridge

volumes:
  grafana-vol:
    driver: local
    driver_opts:
      type: nfs
      o: addr=${NFS_SERVER:-nas.jclee.me},rw,nfsvers=4
      device: ":${NFS_BASE_PATH:-/volume1/docker/grafana}/grafana-vol"
  prometheus-vol:
    driver: local
    driver_opts:
      type: nfs
      o: addr=${NFS_SERVER:-nas.jclee.me},rw,nfsvers=4
      device: ":${NFS_BASE_PATH:-/volume1/docker/grafana}/prometheus-vol"
  loki-vol:
    driver: local
    driver_opts:
      type: nfs
      o: addr=${NFS_SERVER:-nas.jclee.me},rw,nfsvers=4
      device: ":${NFS_BASE_PATH:-/volume1/docker/grafana}/loki-vol"
  alertmanager-vol:
    driver: local
    driver_opts:
      type: nfs
      o: addr=${NFS_SERVER:-nas.jclee.me},rw,nfsvers=4
      device: ":${NFS_BASE_PATH:-/volume1/docker/grafana}/alertmanager-vol"
  n8n-vol:
    driver: local
    driver_opts:
      type: nfs
      o: addr=${NFS_SERVER:-nas.jclee.me},rw,nfsvers=4
      device: ":${NFS_BASE_PATH:-/volume1/docker/grafana}/n8n-vol"
  n8n-postgres-vol:
    driver: local
    driver_opts:
      type: nfs
      o: addr=${NFS_SERVER:-nas.jclee.me},rw,nfsvers=4
      device: ":${NFS_BASE_PATH:-/volume1/docker/grafana}/n8n-postgres-vol"
  n8n-redis-vol:
    driver: local
    driver_opts:
      type: nfs
      o: addr=${NFS_SERVER:-nas.jclee.me},rw,nfsvers=4
      device: ":${NFS_BASE_PATH:-/volume1/docker/grafana}/n8n-redis-vol"
