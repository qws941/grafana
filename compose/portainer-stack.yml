version: "3.8"

# Portainer Stack Configuration for Grafana Monitoring
# Git Repository: https://github.com/qws941/claude.git
# Path: grafana/portainer-stack.yml

services:
  grafana:
    image: grafana/grafana:${GRAFANA_VERSION:-latest}
    container_name: grafana-container
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD:-bingogo1}
      - GF_SERVER_DOMAIN=${GRAFANA_DOMAIN:-grafana.jclee.me}
      - GF_SERVER_ROOT_URL=https://${GRAFANA_DOMAIN:-grafana.jclee.me}
      - GF_INSTALL_PLUGINS=${GRAFANA_PLUGINS:-grafana-clock-panel,grafana-simple-json-datasource,grafana-piechart-panel}
      - GF_FEATURE_TOGGLES_ENABLE=publicDashboards
    volumes:
      - grafana-vol:/var/lib/grafana
    restart: unless-stopped
    networks:
      - traefik-public
      - monitoring-net
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=traefik-public"
      - "traefik.http.routers.grafana.rule=Host(`${GRAFANA_DOMAIN:-grafana.jclee.me}`)"
      - "traefik.http.routers.grafana.entrypoints=websecure"
      - "traefik.http.routers.grafana.tls.certresolver=cloudflare"
      - "traefik.http.services.grafana.loadbalancer.server.port=3000"
      # Portainer labels for stack management
      - "portainer.stack=grafana-monitoring"
      - "portainer.service=grafana"

  loki:
    image: grafana/loki:${LOKI_VERSION:-latest}
    container_name: loki-container
    volumes:
      - loki-vol:/loki
      - ./loki-config.yaml:/etc/loki/local-config.yaml:ro
    restart: unless-stopped
    networks:
      - traefik-public
      - monitoring-net
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=traefik-public"
      - "traefik.http.routers.loki.rule=Host(`${LOKI_DOMAIN:-loki.jclee.me}`)"
      - "traefik.http.routers.loki.entrypoints=websecure"
      - "traefik.http.routers.loki.tls.certresolver=cloudflare"
      - "traefik.http.services.loki.loadbalancer.server.port=3100"
      - "portainer.stack=grafana-monitoring"
      - "portainer.service=loki"

  prometheus:
    image: prom/prometheus:${PROMETHEUS_VERSION:-latest}
    container_name: prometheus-container
    volumes:
      - prometheus-vol:/prometheus
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=${PROMETHEUS_RETENTION:-30d}'
      - '--web.enable-lifecycle'
      - '--web.enable-admin-api'
    restart: unless-stopped
    networks:
      - traefik-public
      - monitoring-net
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=traefik-public"
      - "traefik.http.routers.prometheus.rule=Host(`${PROMETHEUS_DOMAIN:-prometheus.jclee.me}`)"
      - "traefik.http.routers.prometheus.entrypoints=websecure"
      - "traefik.http.routers.prometheus.tls.certresolver=cloudflare"
      - "traefik.http.services.prometheus.loadbalancer.server.port=9090"
      - "portainer.stack=grafana-monitoring"
      - "portainer.service=prometheus"

  promtail:
    image: grafana/promtail:${PROMTAIL_VERSION:-latest}
    container_name: promtail-container
    volumes:
      - ${HOST_LOG_PATH:-/var/log}:/var/log:ro
      - ${DOCKER_SOCK_PATH:-/var/run/docker.sock}:/var/run/docker.sock:ro
      - ./promtail-config.yml:/etc/promtail/config.yml:ro
    command: -config.file=/etc/promtail/config.yml
    restart: unless-stopped
    networks:
      - monitoring-net
    labels:
      - "portainer.stack=grafana-monitoring"
      - "portainer.service=promtail"

  node-exporter:
    image: prom/node-exporter:latest
    container_name: node-exporter-container
    volumes:
      - ${HOST_PROC_PATH:-/proc}:/host/proc:ro
      - ${HOST_SYS_PATH:-/sys}:/host/sys:ro
      - ${HOST_ROOT_PATH:-/}:/rootfs:ro
    command:
      - '--path.procfs=/host/proc'
      - '--path.rootfs=/rootfs'
      - '--path.sysfs=/host/sys'
      - '--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($|/)'
    restart: unless-stopped
    networks:
      - monitoring-net
    labels:
      - "portainer.stack=grafana-monitoring"
      - "portainer.service=node-exporter"

  cadvisor:
    image: gcr.io/cadvisor/cadvisor:latest
    container_name: cadvisor-container
    volumes:
      - ${HOST_ROOT_PATH:-/}:/rootfs:ro
      - ${HOST_VAR_RUN_PATH:-/var/run}:/var/run:rw
      - /sys:/sys:ro
      - ${HOST_DOCKER_PATH:-/var/lib/docker}:/var/lib/docker:ro
    privileged: true
    restart: unless-stopped
    networks:
      - monitoring-net
    labels:
      - "portainer.stack=grafana-monitoring"
      - "portainer.service=cadvisor"

  alertmanager:
    image: prom/alertmanager:latest
    container_name: alertmanager-container
    volumes:
      - alertmanager-vol:/alertmanager
    command:
      - '--storage.path=/alertmanager'
    restart: unless-stopped
    networks:
      - monitoring-net
      - traefik-public
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=traefik-public"
      - "traefik.http.routers.alertmanager.rule=Host(`${ALERTMANAGER_DOMAIN:-alertmanager.jclee.me}`)"
      - "traefik.http.routers.alertmanager.entrypoints=websecure"
      - "traefik.http.routers.alertmanager.tls.certresolver=cloudflare"
      - "traefik.http.services.alertmanager.loadbalancer.server.port=9093"
      - "portainer.stack=grafana-monitoring"
      - "portainer.service=alertmanager"

networks:
  traefik-public:
    external: true
  monitoring-net:
    driver: bridge

volumes:
  grafana-vol:
    driver: local
    driver_opts:
      type: nfs
      o: addr=${NFS_SERVER:-nas.jclee.me},rw,nfsvers=4
      device: ":${NFS_BASE_PATH:-/volume1/docker/grafana}/grafana-vol"
  prometheus-vol:
    driver: local
    driver_opts:
      type: nfs
      o: addr=${NFS_SERVER:-nas.jclee.me},rw,nfsvers=4
      device: ":${NFS_BASE_PATH:-/volume1/docker/grafana}/prometheus-vol"
  loki-vol:
    driver: local
    driver_opts:
      type: nfs
      o: addr=${NFS_SERVER:-nas.jclee.me},rw,nfsvers=4
      device: ":${NFS_BASE_PATH:-/volume1/docker/grafana}/loki-vol"
  alertmanager-vol:
    driver: local
    driver_opts:
      type: nfs
      o: addr=${NFS_SERVER:-nas.jclee.me},rw,nfsvers=4
      device: ":${NFS_BASE_PATH:-/volume1/docker/grafana}/alertmanager-vol"