version: "3.8"

# Grafana Monitoring Stack - Synology NAS Optimized
# Repository: https://github.com/qws941/claude.git
# Path: grafana/compose/docker-compose.yml
# 
# Features:
# - Synology NAS compatible volume paths
# - No problematic system mounts
# - Direct port access for easy setup
# - Simplified configuration

services:
  grafana:
    image: grafana/grafana:latest
    container_name: grafana-container
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=bingogo1
      - GF_SERVER_DOMAIN=grafana.jclee.me
      - GF_SERVER_ROOT_URL=https://grafana.jclee.me
      - GF_INSTALL_PLUGINS=grafana-clock-panel,grafana-simple-json-datasource,grafana-piechart-panel
      - GF_FEATURE_TOGGLES_ENABLE=publicDashboards
    volumes:
      - grafana-data:/var/lib/grafana
      - ${GRAFANA_CONFIG_PATH:-/volume1/docker/grafana}/configs/provisioning:/etc/grafana/provisioning:ro
    restart: unless-stopped
    networks:
      - traefik-public
      - monitoring-net
    depends_on:
      - prometheus
      - loki
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=traefik-public"
      - "traefik.http.routers.grafana.rule=Host(`grafana.jclee.me`)"
      - "traefik.http.routers.grafana.entrypoints=websecure"
      - "traefik.http.routers.grafana.tls.certresolver=cloudflare"
      - "traefik.http.services.grafana.loadbalancer.server.port=3000"

  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus-container
    volumes:
      - prometheus-data:/prometheus
      - ${GRAFANA_CONFIG_PATH:-/volume1/docker/grafana}/configs/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=30d'
      - '--web.enable-lifecycle'
      - '--web.enable-admin-api'
    restart: unless-stopped
    networks:
      - traefik-public
      - monitoring-net
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=traefik-public"
      - "traefik.http.routers.prometheus.rule=Host(`prometheus.jclee.me`)"
      - "traefik.http.routers.prometheus.entrypoints=websecure"
      - "traefik.http.routers.prometheus.tls.certresolver=cloudflare"
      - "traefik.http.services.prometheus.loadbalancer.server.port=9090"

  loki:
    image: grafana/loki:latest
    container_name: loki-container
    command: ["-config.file=/etc/loki/local-config.yaml", "-target=all"]
    volumes:
      - loki-data:/loki
    restart: unless-stopped
    networks:
      - traefik-public
      - monitoring-net
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=traefik-public"
      - "traefik.http.routers.loki.rule=Host(`loki.jclee.me`)"
      - "traefik.http.routers.loki.entrypoints=websecure"
      - "traefik.http.routers.loki.tls.certresolver=cloudflare"
      - "traefik.http.services.loki.loadbalancer.server.port=3100"

  promtail:
    image: grafana/promtail:latest
    container_name: promtail-container
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ${GRAFANA_CONFIG_PATH:-/volume1/docker/grafana}/configs/promtail-config.yml:/etc/promtail/config.yml:ro
    command: -config.file=/etc/promtail/config.yml
    restart: unless-stopped
    networks:
      - monitoring-net

  alertmanager:
    image: prom/alertmanager:latest
    container_name: alertmanager-container
    volumes:
      - alertmanager-data:/alertmanager
      - ${GRAFANA_CONFIG_PATH:-/volume1/docker/grafana}/configs/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
    command:
      - '--config.file=/etc/alertmanager/alertmanager.yml'
      - '--storage.path=/alertmanager'
    restart: unless-stopped
    networks:
      - traefik-public
      - monitoring-net
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=traefik-public"
      - "traefik.http.routers.alertmanager.rule=Host(`alertmanager.jclee.me`)"
      - "traefik.http.routers.alertmanager.entrypoints=websecure"
      - "traefik.http.routers.alertmanager.tls.certresolver=cloudflare"
      - "traefik.http.services.alertmanager.loadbalancer.server.port=9093"

  node-exporter:
    image: prom/node-exporter:latest
    container_name: node-exporter-container
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    command:
      - '--path.procfs=/host/proc'
      - '--path.rootfs=/rootfs'
      - '--path.sysfs=/host/sys'
      - '--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)'
    restart: unless-stopped
    networks:
      - monitoring-net

  cadvisor:
    image: gcr.io/cadvisor/cadvisor:latest
    container_name: cadvisor-container
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:rw
      - /sys:/sys:ro
      - /var/lib/docker:/var/lib/docker:ro
    privileged: true
    restart: unless-stopped
    networks:
      - monitoring-net

  # ============================================
  # n8n Workflow Automation
  # ============================================
  n8n:
    image: n8nio/n8n:latest
    container_name: n8n-container
    restart: unless-stopped
    environment:
      - N8N_HOST=n8n.jclee.me
      - N8N_PORT=5678
      - N8N_PROTOCOL=https
      - N8N_METRICS=true
      - N8N_METRICS_PREFIX=n8n_
      - DB_TYPE=postgresdb
      - DB_POSTGRESDB_HOST=n8n-postgres
      - DB_POSTGRESDB_PORT=5432
      - DB_POSTGRESDB_DATABASE=n8n
      - DB_POSTGRESDB_USER=n8n
      - DB_POSTGRESDB_PASSWORD=${N8N_DB_PASSWORD:-n8n_password}
      - EXECUTIONS_MODE=queue
      - QUEUE_BULL_REDIS_HOST=n8n-redis
      - QUEUE_BULL_REDIS_PORT=6379
      - N8N_LOG_LEVEL=info
      - N8N_LOG_OUTPUT=console
      - N8N_BASIC_AUTH_ACTIVE=true
      - N8N_BASIC_AUTH_USER=admin
      - N8N_BASIC_AUTH_PASSWORD=${N8N_PASSWORD:-bingogo1}
      - GENERIC_TIMEZONE=Asia/Seoul
      - TZ=Asia/Seoul
    volumes:
      - n8n-data:/home/node/.n8n
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - traefik-public
      - monitoring-net
    depends_on:
      - n8n-postgres
      - n8n-redis
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=traefik-public"
      - "traefik.http.routers.n8n.rule=Host(`n8n.jclee.me`)"
      - "traefik.http.routers.n8n.entrypoints=websecure"
      - "traefik.http.routers.n8n.tls.certresolver=cloudflare"
      - "traefik.http.services.n8n.loadbalancer.server.port=5678"

  n8n-postgres:
    image: postgres:15-alpine
    container_name: n8n-postgres-container
    restart: unless-stopped
    environment:
      - POSTGRES_DB=n8n
      - POSTGRES_USER=n8n
      - POSTGRES_PASSWORD=${N8N_DB_PASSWORD:-n8n_password}
    volumes:
      - n8n-postgres-data:/var/lib/postgresql/data
    networks:
      - monitoring-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U n8n"]
      interval: 10s
      timeout: 5s
      retries: 5

  n8n-redis:
    image: redis:7-alpine
    container_name: n8n-redis-container
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - n8n-redis-data:/data
    networks:
      - monitoring-net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  n8n-postgres-exporter:
    image: prometheuscommunity/postgres-exporter:latest
    container_name: n8n-postgres-exporter-container
    restart: unless-stopped
    environment:
      - DATA_SOURCE_NAME=postgresql://n8n:${N8N_DB_PASSWORD:-n8n_password}@n8n-postgres:5432/n8n?sslmode=disable
    networks:
      - monitoring-net
    depends_on:
      - n8n-postgres

  n8n-redis-exporter:
    image: oliver006/redis_exporter:latest
    container_name: n8n-redis-exporter-container
    restart: unless-stopped
    environment:
      - REDIS_ADDR=n8n-redis:6379
    networks:
      - monitoring-net
    depends_on:
      - n8n-redis

networks:
  traefik-public:
    external: true
  monitoring-net:
    name: grafana-monitoring-net
    driver: bridge

volumes:
  grafana-data:
    driver: local
  prometheus-data:
    driver: local
  loki-data:
    driver: local
  alertmanager-data:
    driver: local
  n8n-data:
    driver: local
  n8n-postgres-data:
    driver: local
  n8n-redis-data:
    driver: local