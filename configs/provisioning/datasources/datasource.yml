apiVersion: 1

datasources:
  - name: Prometheus
    type: prometheus
    access: proxy
    url: http://prometheus-container:9090
    isDefault: true
    editable: true

  - name: Loki
    type: loki
    access: proxy
    url: http://loki-container:3100
    editable: true
    jsonData:
      maxLines: 1000

  - name: AlertManager
    type: alertmanager
    access: proxy
    url: http://alertmanager-container:9093
    editable: true