apiVersion: 1

providers:
  - name: 'docker-monitoring'
    orgId: 1
    folder: 'Docker Monitoring'
    type: file
    disableDeletion: false
    updateIntervalSeconds: 10
    allowUiUpdates: true
    options:
      path: /etc/grafana/provisioning/dashboards/docker-monitoring.json
      foldersFromFilesStructure: false