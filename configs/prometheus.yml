global:
  scrape_interval: 15s
  evaluation_interval: 15s

alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - alertmanager:9093

rule_files:
  - "/etc/prometheus/rules/*.yml"

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  - job_name: 'grafana'
    static_configs:
      - targets: ['grafana:3000']

  - job_name: 'loki'
    static_configs:
      - targets: ['loki:3100']

  - job_name: 'node-exporter'
    static_configs:
      - targets: ['node-exporter:9100']

  - job_name: 'cadvisor'
    static_configs:
      - targets: ['cadvisor:8080']

  # n8n Workflow Automation
  - job_name: 'n8n'
    static_configs:
      - targets: ['n8n:5678']
    metrics_path: '/metrics'

  - job_name: 'n8n-postgres'
    static_configs:
      - targets: ['n8n-postgres-exporter-container:9187']

  - job_name: 'n8n-redis'
    static_configs:
      - targets: ['n8n-redis-exporter:9121']

  # Blacklist Service
  - job_name: 'blacklist'
    static_configs:
      - targets: ['blacklist.jclee.me:2542']
    metrics_path: '/metrics'
